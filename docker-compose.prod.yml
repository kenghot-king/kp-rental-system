services:
  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  odoo:
    image: odoo:19.0
    depends_on:
      - db
    ports:
      - "8071:8069"
    volumes:
      - ./addons:/mnt/extra-addons/custom:ro
      - odoo-data:/var/lib/odoo
    command: >
      -- --addons-path=/mnt/extra-addons/custom
         --db_host=db
         --db_user=odoo
         --db_password=${POSTGRES_PASSWORD}
         -d production
         --workers=2
         --max-cron-threads=1
         --without-demo=all
    restart: unless-stopped

volumes:
  pgdata:
  odoo-data:
